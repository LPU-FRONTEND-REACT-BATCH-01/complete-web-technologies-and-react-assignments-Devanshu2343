<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #fruits_heading {
            color: green;
            text-align: center;
        }

        .fruits {
            color: orange;
            font-size: 20px;
            background-color: midnightblue;
        }

        .apple {
            color: red;
        }

        #vegetables_heading {
            color: darkgreen;
            text-align: center;
        }
        .vegetables {
            color: darkred;
            font-size: 20px;
            background-color: lightgray;
        }
        .tomato {
            color: green;
        }

        .heading {
            text-decoration: underline;
            color: blue;
        }
    </style>
</head>
<body>
    <ul>
        <h1 id="fruits_heading">Fruits</h1>
        <li class="fruits">Mango</li>
        <li class="fruits">Orange</li>
        <li class="fruits apple">Apple</li>
        <li class="fruits">Banana</li>
        <li class="fruits">Grapes</li>
        <li class="fruits">Strawberry</li>
    </ul>

    <ul>
        <h1 id="vegetables_heading" class="heading">Vegetables</h1>
        <li class="vegetables">Carrot</li>
        <li class="vegetables">Broccoli</li>
        <li class="vegetables tomato">Tomato</li>
    </ul>


</body>
</html>
