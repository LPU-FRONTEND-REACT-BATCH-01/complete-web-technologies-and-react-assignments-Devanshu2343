<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        html{
            font-size: 5px;
        }
        .parent{
            /* width: 200px;
            height: 200px; */

            width: 100vw ;
            height: 100vh;
            background-color: rgb(56, 93, 59);
            font-size: 2em;
            
        }
        .child1{
            font-size: 2em;
            font-family: cursive;
        }

        .child2{
            font-size: 3em;
            font-style: italic;
            font-weight: 900;
        }

        .child3{
            font-size: 4em;

        }

        div{
            
            background-color: rgb(93, 56, 60);
            height: 200px;
        }

    </style>
</head>
<body>
    
    <div class="parent">
        <p>This is parent</p>
        <p class="child1" > This is first child</p>
        <p class="child2"> This is second child</p>
        <p class="child3"> This is third child</p>

    </div>

</body>
</html>
