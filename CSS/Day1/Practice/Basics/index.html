<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial;
        }

        h1 {
            color: darkgreen;
            text-align: center;
        }

       

        .box {
            border: 2px solid gray;
            padding: 15px;
            margin-top: 10px;
            color: darkred;
        }
    </style>
</head>
<body>
    <h1 style="background-color: rgb(32, 34, 35); color: rgb(205, 109, 50); ">
        This is inline CSS
    </h1>

    <p style="background-color: lightgray; color: darkblue; ">
        This is a paragraph with inline CSS. It has a background color of light gray and a text color of dark blue.
    </p>

    <p style="color: blue; font-size: 20px;">
    This is styled using inline CSS
</p>

    <div style="background-color: lightgreen; padding: 10px; border: 1px solid green;">
        This is a div with inline CSS. It has a light green background, padding of 10 pixels, and a green border.
    </div>

    <div class="box">
    This is a styled box
    </div>


</body>
</html>
