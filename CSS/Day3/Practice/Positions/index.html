<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            width: 500px ;
            height: 500px;
            background-color: bisque;
            position: relative;
            left: 200px;
            top : 200px; 
        }
        .item{
            width: 100px;
            height: 100px;
            background-color: rgb(93, 56, 56);
            border: 8px solid black;
                
        }

        .item1{
            position: static;
           
        }
        .item2{
            position: static;
         
        }
        .item3{
            position: absolute;
            left: 500px;
            top: 500px;
        }
       
        .item4{
            position: fixed;
            top: 0;
            left: 0;
        }
        
    </style>
</head>
<body>
    <div class="container">

        <div class="item1 item"> Item1</div>
        <div class="item2 item"> Item2</div>
        <div class="item3 item"> Item3</div>
        <div class="item4 item"> Item4</div>

    </div>
</body>
</html>
