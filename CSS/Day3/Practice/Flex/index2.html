<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{

            width: 70% ;
            height: 500px;
            background-color: bisque;
            
        
             display: flex;
             flex-direction: row;
            justify-content: space-around;
                align-items: center;
                 
             
           
        }
        .item{
            width: 100px;
            height: 100px;
            background-color: rgb(93, 56, 56);
            border: 8px solid black;
            border-radius: 25%;
            text-align: center;
            line-height: 100px;
            text-decoration: underline ;
            font-weight: 400;
            font-size: larger;
           

                
        }
        .item1{
            flex-grow: 1;
            flex-shrink: 0;
            
        }

        
        
    </style>
</head>
<body>
    <div class="container">

        <div class="item1 item"> Item1</div>
        <div class="item2 item"> Item2</div>
        <div class="item3 item"> Item3</div>
        <div class="item4 item"> Item4</div>

    </div>
</body>
</html>
