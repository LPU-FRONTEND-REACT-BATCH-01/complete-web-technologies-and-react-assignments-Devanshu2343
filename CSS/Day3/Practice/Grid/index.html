<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{

            width: 90% ;
            height: 600px;
            background-color: bisque;
            display: grid;
            grid-template-rows: 150px 150px  150px 150px;
            grid-template-columns: 150px 200px 250px 300px;
            justify-content: center;
            justify-items: center;
            align-items: center;
            align-content: center;
           
        }
        .item{
            width: 100px;
            height: 100px;
            background-color: rgb(93, 56, 56);
            border: 8px solid black;
            border-radius: 25%;
            text-align: center;
            line-height: 100px;
            text-decoration: underline ;
            font-weight: 400;
            font-size: larger;
           

                
        }

        .item1{
            /* grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 3; */

            grid-row: 1/3;
            grid-column: 1/3;
        }

        
        
    </style>
</head>
<body>
    <div class="container">

        <div class="item1 item"> Item1</div>
        <div class="item2 item"> Item2</div>
        <div class="item3 item"> Item3</div>
        <div class="item4 item"> Item4</div>
         <div class="item1 item"> Item1</div>
        <div class="item2 item"> Item2</div>
        <div class="item3 item"> Item3</div>
        <div class="item4 item"> Item4</div>

    </div>
</body>
</html>
