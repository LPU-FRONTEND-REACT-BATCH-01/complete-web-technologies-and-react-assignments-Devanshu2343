<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            width: 300px;
            height: 200px;
            border: 2px solid black;
            
            padding: 15px;
            margin: 15px;
        }

        .box1{
            box-sizing: border-box;
            background-color: rgb(56, 93, 59);
        }

        .box2{
            box-sizing: content-box;
            background-color: rgb(125, 16, 16);
        }
        .p1{
            width: 100%;
            /* text-align: center; */
            margin-left: 50px;
            /* margin: 200px; */
            box-sizing: border-box;
        }
    </style>

</head>
<body>
    

    <div class="box1 box"> Box 1</div>

    <br>

    <div class="box2 box"> Box 2</div>
    <div >
        <p class ="p1" >
            Hello
        </p>
    </div>

</body>
</html>
