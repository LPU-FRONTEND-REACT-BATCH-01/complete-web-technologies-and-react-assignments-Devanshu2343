<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Radius</title>

    <style>
        .box{
            text-align: center;
            text-decoration: none;
             color: white;
             font-size: 20px;
             font-weight: bold;
            width: 200px;
            height: 200px;
           padding: 30px;
            margin: 10px;
        }

        .box1{
            border-radius: 90px;
             background-color: rgb(8, 43, 11);
        }

        .box2{
            border-radius: 20px 90px;
             background-color: rgb(11, 8, 43);
        }

        .box3{
            border-radius: 30px 90px 40px ;
             background-color: rgb(43, 26, 8);
        }

        .box4{
            border-radius: 20px 30px 40px;
             background-color: rgb(165, 49, 126);
        }
    </style>
</head>
<body>
    
    <div class="box1 box">Box1</div>
    <div class="box2 box">Box2</div>
    <div class="box3 box">Box3</div>
    <div class="box4 box">  Box4   </div>
</body>
</html>
